name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build for Linux
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" -o mcp-gedcom-linux-amd64 ./cmd/mcp-gedcom/server

      - name: Build for macOS
        env:
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" -o mcp-gedcom-darwin-amd64 ./cmd/mcp-gedcom/server

      - name: Build for Windows
        env:
          GOOS: windows
          GOARCH: amd64
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" -o mcp-gedcom-windows-amd64.exe ./cmd/mcp-gedcom/server

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
          files: |
            mcp-gedcom-linux-amd64
            mcp-gedcom-darwin-amd64
            mcp-gedcom-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
